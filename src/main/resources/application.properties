# ===================== Server =====================
server.port=${PORT:8080}

# ===================== Database (H2, in-memory — zero setup) =====================
# Data resets every time you restart the app. Good enough to test the app end to end.
# When you want a real database, replace this block with a Postgres/MySQL datasource.
spring.datasource.url=jdbc:h2:file:./data/devradar;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console at http://localhost:8080/h2-console (JDBC URL above, empty password)
spring.h2.console.enabled=true

# ===================== JWT =====================
# IMPORTANT: this is a randomly generated example secret, fine for local testing only.
# Generate your own for anything beyond your own machine, e.g.:
#   python3 -c "import base64, os; print(base64.b64encode(os.urandom(64)).decode())"
jwt.secret=Gtjzq6NGOHCYOCePCuYe3WfTj/Qv1IuZnCTPk7gcHzqE1FJ9RyirvY1nJiYMTxPVF5QCVmjf7Wv48trmaGdFmQ==
# 24 hours, in milliseconds
jwt.expiration=86400000

# ===================== AI (Groq / Gemini) =====================
# Groq API key (gsk_ prefix auto-routes to Groq instead of Gemini).
# Get a key at https://console.groq.com/keys
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=llama-3.3-70b-versatile
gemini.timeout.connect-ms=5000
gemini.timeout.read-ms=30000

# ===================== Render/HTTPS/Security =====================
server.forward-headers-strategy=native
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.internal-proxies=.*
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# ===================== Spring Security OAuth2 Client =====================
# Google Provider
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

# GitHub Provider
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
