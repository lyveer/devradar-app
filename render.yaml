services:
  - type: web
    name: devradar
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 8080
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: devradar-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: devradar-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: devradar-db
          property: password

databases:
  - name: devradar-db
    plan: free
    region: oregon
